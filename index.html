<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1e40af">
  <title>Family Bookshelf</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <h1>📚 Family Bookshelf</h1>
      <p>Track what you're reading, buying, and loving</p>
    </div>

    <!-- Tab switcher (hidden during MFA step) -->
    <div class="auth-tabs" id="auth-tabs">
      <button class="auth-tab active" id="tab-login"  onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab"        id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Error message -->
    <div class="error-msg" id="auth-error"></div>

    <!-- Login form -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Your password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
    </form>

    <!-- Signup form (hidden initially) -->
    <form id="signup-form" style="display:none" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label for="signup-name">Your Name</label>
        <input type="text" id="signup-name" placeholder="Jane Smith" autocomplete="name" required>
      </div>
      <div class="form-group">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" placeholder="At least 8 characters" autocomplete="new-password" minlength="8" required>
      </div>
      <button type="submit" class="btn btn-primary" id="signup-btn">Create Account</button>
    </form>

    <!-- MFA step (hidden until password auth succeeds and MFA is required) -->
    <div id="mfa-form" style="display:none">
      <div style="text-align:center;margin-bottom:1.25rem">
        <div style="font-size:2rem;margin-bottom:0.5rem">🔐</div>
        <h3 style="font-size:1rem;font-weight:700;color:#1f2937;margin:0 0 0.3rem">Two-Factor Authentication</h3>
        <p style="font-size:0.85rem;color:#6b7280;margin:0">Enter the 6-digit code from your authenticator app</p>
      </div>
      <div class="form-group">
        <label for="mfa-code">Authentication Code</label>
        <input type="text" id="mfa-code" placeholder="000000" maxlength="6" inputmode="numeric"
          autocomplete="one-time-code" style="letter-spacing:0.3em;font-size:1.4rem;text-align:center"
          oninput="this.value=this.value.replace(/\D/g,'')">
      </div>
      <button class="btn btn-primary" id="mfa-btn" onclick="handleMfa()">Verify Code</button>
      <button type="button" style="width:100%;margin-top:0.5rem;padding:0.6rem;background:none;border:none;color:#6b7280;font-size:0.85rem;cursor:pointer" onclick="cancelMfa()">
        ← Back to sign in
      </button>
    </div>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    let _mfaChallengeId = null;

    // Handle auth state — covers existing sessions and email confirmation redirects
    (async () => {
      const { data: { session } } = await getSupabase().auth.getSession();
      if (session) {
        // Check if MFA upgrade is still needed
        const { data: aal } = await getSupabase().auth.mfa.getAuthenticatorAssuranceLevel();
        if (aal.nextLevel === 'aal2' && aal.nextLevel !== aal.currentLevel) {
          await showMfaStep();
        } else {
          window.location.href = 'app.html';
        }
        return;
      }
      // Only used for email confirmation link redirects
      getSupabase().auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session) {
          const { data: aal } = await getSupabase().auth.mfa.getAuthenticatorAssuranceLevel();
          if (aal.nextLevel === 'aal2' && aal.nextLevel !== aal.currentLevel) {
            await showMfaStep();
          } else {
            window.location.href = 'app.html';
          }
        }
      });
    })();

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('tab-login').classList.toggle('active', isLogin);
      document.getElementById('tab-signup').classList.toggle('active', !isLogin);
      document.getElementById('login-form').style.display  = isLogin ? '' : 'none';
      document.getElementById('signup-form').style.display = isLogin ? 'none' : '';
      clearError();
    }

    function showError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.classList.add('show');
    }
    function clearError() {
      document.getElementById('auth-error').classList.remove('show');
    }

    async function handleLogin(e) {
      e.preventDefault();
      clearError();
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const { error } = await getSupabase().auth.signInWithPassword({ email, password });
      if (error) {
        showError(error.message);
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }
      // Handle redirect directly — don't rely on onAuthStateChange (race condition)
      const { data: aal } = await getSupabase().auth.mfa.getAuthenticatorAssuranceLevel();
      if (aal.nextLevel === 'aal2' && aal.nextLevel !== aal.currentLevel) {
        await showMfaStep();
      } else {
        window.location.href = 'app.html';
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      clearError();
      const btn = document.getElementById('signup-btn');
      btn.disabled = true;
      btn.textContent = 'Creating account…';
      const name     = document.getElementById('signup-name').value.trim();
      const email    = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;

      const { data, error } = await getSupabase().auth.signUp({ email, password });
      if (error) {
        showError(error.message);
        btn.disabled = false;
        btn.textContent = 'Create Account';
        return;
      }
      if (data.user) {
        await getSupabase().from('profiles').insert({ id: data.user.id, name });
      }
      window.location.href = 'app.html';
    }

    // ── MFA ──────────────────────────────────────────────────────────────────
    async function showMfaStep() {
      // Only use verified factors — unverified ones from abandoned enrollments cause silent failures
      const allFactors = (await getSupabase().auth.mfa.listFactors()).data?.totp ?? [];
      const factors = allFactors.filter(f => f.status === 'verified');
      if (!factors.length) { window.location.href = 'app.html'; return; }

      const { data, error } = await getSupabase().auth.mfa.challenge({ factorId: factors[0].id });
      if (error) { showError(error.message); return; }
      _mfaChallengeId = data.id;

      // Show the MFA input, hide everything else
      document.getElementById('auth-tabs').style.display   = 'none';
      document.getElementById('login-form').style.display  = 'none';
      document.getElementById('signup-form').style.display = 'none';
      document.getElementById('mfa-form').style.display    = '';
      clearError();
      setTimeout(() => document.getElementById('mfa-code').focus(), 100);
    }

    async function handleMfa() {
      const code = document.getElementById('mfa-code').value.trim();
      if (code.length !== 6) { showError('Enter all 6 digits.'); return; }

      const btn = document.getElementById('mfa-btn');
      btn.disabled = true;
      btn.textContent = 'Verifying…';
      clearError();

      try {
        const allFactors = (await getSupabase().auth.mfa.listFactors()).data?.totp ?? [];
        const factors = allFactors.filter(f => f.status === 'verified');
        if (!factors.length) { window.location.href = 'app.html'; return; }

        // Create a fresh challenge at verify time — stored challenge may have expired
        const { data: ch, error: chErr } = await getSupabase().auth.mfa.challenge({ factorId: factors[0].id });
        if (chErr) { showError(chErr.message); btn.disabled = false; btn.textContent = 'Verify Code'; return; }

        const { error } = await getSupabase().auth.mfa.verify({
          factorId:    factors[0].id,
          challengeId: ch.id,
          code,
        });

        if (error) {
          showError('Incorrect code. Try again.');
          document.getElementById('mfa-code').value = '';
          btn.disabled = false;
          btn.textContent = 'Verify Code';
        } else {
          window.location.href = 'app.html';
        }
      } catch (err) {
        showError('Verification error — please sign in again.');
        btn.disabled = false;
        btn.textContent = 'Verify Code';
      }
    }

    function cancelMfa() {
      _mfaChallengeId = null;
      getSupabase().auth.signOut();
      document.getElementById('auth-tabs').style.display   = '';
      document.getElementById('login-form').style.display  = '';
      document.getElementById('mfa-form').style.display    = 'none';
      clearError();
    }

    // Allow pressing Enter on the MFA code field
    document.getElementById('mfa-code').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleMfa();
    });
  </script>
</body>
</html>
